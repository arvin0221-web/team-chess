<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>自肥西洋棋</title>

<style>
body{
font-family:sans-serif;
text-align:center;
background:#222;
color:white;
}

#board{
width:480px;
height:480px;
margin:auto;
display:grid;
grid-template-columns:repeat(8,1fr);
}

.square{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
}

.white{background:#eee;color:black}
.black{background:#666}

button{padding:10px;margin:5px}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<h1>西西西洋棋</h1>

<div id="menu">

<button onclick="createRoom()">創建房間</button>

<input id="roomInput" placeholder="房間ID">

<button onclick="joinRoom()">加入房間</button>

<br><br>

<button onclick="chooseColor('white')">我要白子</button>
<button onclick="chooseColor('black')">我要黑子</button>

<p id="status"></p>

</div>

<div id="board"></div>

<script src="game.js"></script>

</body>
</html>
